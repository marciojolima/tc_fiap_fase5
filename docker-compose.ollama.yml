services:
  ollama:
    image: ollama/ollama:0.6.5
    container_name: tc-fiap-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ml_platform
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 30s
      retries: 12
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:0.6.5
    container_name: tc-fiap-ollama-pull
    restart: "no"
    networks:
      - ml_platform
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eux
        echo "OLLAMA_HOST=$$OLLAMA_HOST model=$$OLLAMA_MODEL"
        ollama pull "$$OLLAMA_MODEL"
        echo "--- modelos no servidor remoto ---"
        ollama list
        ollama show "$$OLLAMA_MODEL"

  serving:
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      LLM_BASE_URL: http://ollama:11434

volumes:
  ollama_data:
