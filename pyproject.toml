[project]
name = "tc-fiap-fase5"
version = "0.1.0"
description = "Projeto de Datathon - FIAP 2026"
authors = [
    {name = "Márcio Lima",email = "marciocad@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13,<4"
dependencies = [
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "scikit-learn>=1.4.2",
    "mlflow==3.10.1",
    "pandera>=0.19.3",
    "pyarrow>=16.0.0",
    "pyyaml>=6.0.1",
    "joblib>=1.4.2",
    "dvc>=3.51.0",
    "pytest>=8.2.0",
    "fastapi[standard] (>=0.135.3,<0.136.0)",
    "uvicorn>=0.30.0",
    "graphene==3.4.3",
    "graphql-core==3.2.6",
    "graphql-relay==3.2.0",
    "taskipy (>=1.14.1,<2.0.0)",
]

[tool.poetry]
packages = [
    { include = "agent", from = "src" },
    { include = "common", from = "src" },
    { include = "features", from = "src" },
    { include = "inference", from = "src" },
    { include = "models", from = "src" },
    { include = "monitoring", from = "src" },
    { include = "security", from = "src" },
    { include = "serving", from = "src" },
]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0.2"
pytest-cov = "^7.1.0"
ruff = "^0.15.9"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff.lint]
preview = true
select = ['I', 'F', 'E', 'W', 'PL', 'PT', 'FAST']

[tool.pytest.ini_options]
pythonpath = "."
addopts = '-p no:warnings'

[tool.taskipy.tasks]
lint = 'ruff check'
pre_format = 'ruff check --fix'
format = 'ruff format'
mlead = 'python -m src.features.feature_engineering'
mltrain = 'python -m src.models.train'
mlscenario = 'python -m src.inference.scenario_analysis --suite-file examples/scenario_analysis/churn_validation_suite.json'
pre_test = 'task lint'
test = 'pytest -s -x --cov=src -vv'
post_test = 'coverage html'
mlflow = 'mlflow ui --host 127.0.0.1 --port 5000'
serving = 'fastapi dev src/serving/app.py'
