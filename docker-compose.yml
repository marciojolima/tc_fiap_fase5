services:
  # Ollama no mesmo Compose: reproduzivel em qualquer maquina (modelo no volume ollama_data).
  # O serving usa por padrao LLM_BASE_URL=http://ollama:11434 (nome do servico na rede Docker).

  ollama:
    image: ollama/ollama:0.6.5
    container_name: tc-fiap-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ml_platform
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 30s
      retries: 12
      start_period: 20s

  # Job unico: termina com Exited(0) se OK — isso e normal, nao e um servico long-running.
  # Falha com exit != 0 se pull ou verificacao falhar (impede serving de subir com modelo inexistente).
  ollama-pull:
    image: ollama/ollama:0.6.5
    container_name: tc-fiap-ollama-pull
    restart: "no"
    networks:
      - ml_platform
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eux
        echo "OLLAMA_HOST=$$OLLAMA_HOST model=$$OLLAMA_MODEL"
        ollama pull "$$OLLAMA_MODEL"
        echo "--- modelos no servidor remoto ---"
        ollama list
        ollama show "$$OLLAMA_MODEL"
  redis:
    image: redis:7.4-alpine
    container_name: tc-fiap-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - ml_platform

  serving:
    build:
      context: .
      dockerfile: src/serving/Dockerfile
    image: tc-fiap-fase5-app:latest
    container_name: tc-fiap-serving
    restart: unless-stopped
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command:
      - uvicorn
      - serving.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${SERVING_PORT:-8000}:8000"
    environment:
      PROJECT_ROOT: /app
      PYTHONUNBUFFERED: "1"
      # Padrao: Ollama no mesmo Compose. Para Ollama so no host Windows, sobrescreva no .env:
      # LLM_BASE_URL=http://host.docker.internal:11434
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      TZ: America/Sao_Paulo
      PROJECT_TIMEZONE: America/Sao_Paulo
      FEAST_REDIS_CONNECTION_STRING: ${FEAST_REDIS_CONNECTION_STRING:-redis:6379}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs:/app/configs:ro
      - ./artifacts:/app/artifacts
      - ./feature_store:/app/feature_store:ro
    networks:
      - ml_platform

  mlflow:
    build:
      context: .
      dockerfile: src/serving/Dockerfile
    image: tc-fiap-fase5-app:latest
    container_name: tc-fiap-mlflow
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    depends_on:
      - serving
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - file:/app/mlruns
      - --default-artifact-root
      - /app/mlruns
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      PROJECT_ROOT: /app
      PYTHONUNBUFFERED: "1"
      TZ: America/Sao_Paulo
      PROJECT_TIMEZONE: America/Sao_Paulo
    volumes:
      - ./mlruns:/app/mlruns
    networks:
      - ml_platform

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tc-fiap-prometheus
    restart: unless-stopped
    depends_on:
      - serving
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ml_platform

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tc-fiap-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      TZ: America/Sao_Paulo
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./configs/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - ml_platform

networks:
  ml_platform:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  ollama_data:
  redis_data:
