services:
  redis:
    image: redis:7.4-alpine
    container_name: tc-fiap-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - ml_platform

  serving:
    build:
      context: .
      dockerfile: infra/dockerfiles/serving/Dockerfile
    image: tc-fiap-fase5-app:latest
    container_name: tc-fiap-serving
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    command:
      - uvicorn
      - serving.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${SERVING_PORT:-8000}:8000"
    environment:
      HOME: /tmp
      PROJECT_ROOT: /app
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TZ: America/Sao_Paulo
      USER: appuser
      PROJECT_TIMEZONE: America/Sao_Paulo
      FEAST_REDIS_CONNECTION_STRING: ${FEAST_REDIS_CONNECTION_STRING:-redis:6379}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./README.md:/app/README.md:ro
      - ./configs:/app/configs:ro
      - ./data/feature_store:/app/data/feature_store:ro
      - ./data/processed:/app/data/processed:ro
      - ./docs:/app/docs:ro
      - ./artifacts:/app/artifacts
      - ./feature_store:/app/feature_store:ro
    networks:
      - ml_platform

  rag-index:
    build:
      context: .
      dockerfile: infra/dockerfiles/serving/Dockerfile
    image: tc-fiap-fase5-app:latest
    container_name: tc-fiap-rag-index
    profiles:
      - rag
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command:
      - python
      - -m
      - src.agent.rag_pipeline
      - --force-rebuild
    environment:
      HOME: /tmp
      PROJECT_ROOT: /app
      PYTHONUNBUFFERED: "1"
      TZ: America/Sao_Paulo
      USER: appuser
      PROJECT_TIMEZONE: America/Sao_Paulo
    volumes:
      - ./README.md:/app/README.md:ro
      - ./configs:/app/configs:ro
      - ./data/feature_store:/app/data/feature_store:ro
      - ./data/processed:/app/data/processed:ro
      - ./docs:/app/docs:ro
      - ./artifacts:/app/artifacts
      - ./feature_store:/app/feature_store:ro
    networks:
      - ml_platform

  evaluation:
    build:
      context: .
      dockerfile: infra/dockerfiles/evaluation/Dockerfile
    image: tc-fiap-evaluation:latest
    container_name: tc-fiap-evaluation
    profiles:
      - evaluation
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
      PROJECT_ROOT: /app
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TZ: America/Sao_Paulo
      USER: appuser
      PROJECT_TIMEZONE: America/Sao_Paulo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./README.md:/app/README.md:ro
      - ./configs:/app/configs:ro
      - ./data:/app/data:ro
      - ./docs:/app/docs:ro
      - ./artifacts:/app/artifacts
      - ./feature_store:/app/feature_store:ro
    networks:
      - ml_platform

  mlflow:
    build:
      context: .
      dockerfile: infra/dockerfiles/mlflow/Dockerfile
    image: tc-fiap-mlflow:latest
    container_name: tc-fiap-mlflow
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////app/mlruns/mlflow.db
      - --serve-artifacts
      - --artifacts-destination
      - /app/mlruns/artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: America/Sao_Paulo
      PROJECT_TIMEZONE: America/Sao_Paulo
    volumes:
      - ./mlruns:/app/mlruns
    networks:
      - ml_platform

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tc-fiap-prometheus
    restart: unless-stopped
    depends_on:
      - serving
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ml_platform

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tc-fiap-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      TZ: America/Sao_Paulo
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./configs/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - ml_platform

networks:
  ml_platform:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  redis_data:
