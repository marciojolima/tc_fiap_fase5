stages:
  featurize:
    cmd: python -m src.features.feature_engineering
    deps:
      - src/common/config_loader.py
      - src/common/data_loader.py
      - src/common/logger.py
      - src/common/seed.py
      - src/features/schema_validation.py
      - src/features/feature_engineering.py
      - configs/pipeline_global_config.yaml
      - data/raw/Customer-Churn-Records.csv
    outs:
      - data/interim/cleaned.parquet
      - data/processed/train.parquet
      - data/processed/test.parquet
      - data/processed/feature_columns.json
      - data/processed/schema_report.json
      - artifacts/models/feature_pipeline.joblib

  train:
    cmd: python -m src.models.train
    deps:
      - src/common/config_loader.py
      - src/common/logger.py
      - src/common/seed.py
      - src/models/catalog.py
      - src/models/train.py
      - configs/pipeline_global_config.yaml
      - configs/training/model_current.yaml
      - data/processed/train.parquet
      - data/processed/test.parquet
    outs:
      - artifacts/models/model_current.pkl
      - artifacts/models/model_current_metadata.json

  export_feature_store:
    cmd: python -m src.feast_ops.export
    deps:
      - src/common/config_loader.py
      - src/common/data_loader.py
      - src/common/logger.py
      - src/features/feature_engineering.py
      - src/serving/pipeline.py
      - src/feast_ops/config.py
      - src/feast_ops/export.py
      - configs/pipeline_global_config.yaml
      - data/raw/Customer-Churn-Records.csv
      - artifacts/models/feature_pipeline.joblib
    outs:
      - data/feature_store/customer_features.parquet
      - data/feature_store/export_metadata.json
      
