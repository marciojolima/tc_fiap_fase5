stages:

  # ──────────────────────────────────────────────────────────
  # 1. Engenharia de features e preparação dos dados
  # ──────────────────────────────────────────────────────────
  featurize:
    cmd: python -m src.feature_engineering.feature_engineering
    deps:
      - src/common/config_loader.py
      - src/common/data_loader.py
      - src/common/logger.py
      - src/common/seed.py
      - src/feature_engineering/schema_validation.py
      - src/feature_engineering/feature_engineering.py
      - configs/pipeline_global_config.yaml
      - data/raw/Customer-Churn-Records.csv
    outs:
      - data/interim/cleaned.parquet
      - data/processed/train.parquet
      - data/processed/test.parquet
      - data/processed/feature_columns.json
      - data/processed/schema_report.json
      - artifacts/models/feature_pipeline.joblib

  # ──────────────────────────────────────────────────────────
  # 2. Treinamento do modelo champion
  # ──────────────────────────────────────────────────────────
  train:
    cmd: python -m src.model_lifecycle.train
    deps:
      - src/common/config_loader.py
      - src/common/logger.py
      - src/common/seed.py
      - src/model_lifecycle/catalog.py
      - src/model_lifecycle/train.py
      - configs/pipeline_global_config.yaml
      - configs/model_lifecycle/current.json
      - data/processed/train.parquet        # output de featurize → ordem garantida
      - data/processed/test.parquet
    outs:
      - artifacts/models/current.pkl
      - artifacts/models/current_metadata.json

  # ──────────────────────────────────────────────────────────
  # 3. Exportação offline para a Feature Store
  # ──────────────────────────────────────────────────────────
  create_fs_offline:
    cmd: python -m src.feast_ops.export
    deps:
      - src/common/config_loader.py
      - src/common/data_loader.py
      - src/common/logger.py
      - src/feature_engineering/feature_engineering.py
      - src/serving/pipeline.py
      - src/feast_ops/config.py
      - src/feast_ops/export.py
      - configs/pipeline_global_config.yaml
      - data/raw/Customer-Churn-Records.csv
      - artifacts/models/feature_pipeline.joblib  # output de featurize → ordem garantida
    outs:
      - data/feature_store/customer_features.parquet
      - data/feature_store/export_metadata.json

  # ──────────────────────────────────────────────────────────
  # 4. Materialização online no Redis (Feast)
  #    Depende do Redis estar rodando (infra_up já garante)
  # ──────────────────────────────────────────────────────────
  materialize_fs_online:
    cmd: >
      sh -c '
      until docker exec tc-fiap-redis redis-cli ping | grep -q PONG;
      do echo "Aguardando Redis..."; sleep 1; done;
      FEAST_REDIS_CONNECTION_STRING=localhost:6379 feast -c feature_store apply;
      FEAST_REDIS_CONNECTION_STRING=localhost:6379 feast -c feature_store materialize-incremental $(date -u +"%Y-%m-%dT%H:%M:%S")
      '
    deps:
      - feature_store
      - data/feature_store/customer_features.parquet  # output de create_fs_offline → ordem garantida
      - data/feature_store/export_metadata.json
    always_changed: true

  # ──────────────────────────────────────────────────────────
  # 5. Cache vetorial do RAG
  # ──────────────────────────────────────────────────────────
  build_rag_cache:
    cmd: python -m src.agent.rag_pipeline --force-rebuild
    deps:
      - src/agent
      - configs
      - docs
      - README.md
      - artifacts/models/current_metadata.json  # output de train → ordem garantida
    outs:
      artifacts/rag:
        cache: false  # desabilita cache do DVC para o RAG, pois é reconstruído do zero a cada execução

  # ──────────────────────────────────────────────────────────
  # 6. Experimentos MLflow (champion + challengers + cenários)
  #    Grava direto no SQLite local; a UI do MLflow é opcional.
  # ──────────────────────────────────────────────────────────
  run_mlflow_experiments:
    cmd: >-
      sh -c '
      python -m src.model_lifecycle.train &&
      python -m src.model_lifecycle.train --config configs/model_lifecycle/experiments/rf_v1.json &&
      python -m src.model_lifecycle.train --config configs/model_lifecycle/experiments/rf_v2_precision.json &&
      python -m src.model_lifecycle.train --config configs/model_lifecycle/experiments/rf_v3_recall.json &&
      python -m src.model_lifecycle.train --config configs/model_lifecycle/experiments/xgboost_v1.json &&
      python -m src.model_lifecycle.train --config configs/model_lifecycle/experiments/gradient_boosting_v1.json &&
      python -m src.scenario_experiments.inference_cases --suite-file configs/scenario_experiments/inference_cases.yaml
      '
    deps:
      - src/model_lifecycle
      - src/scenario_experiments
      - configs/model_lifecycle
      - configs/scenario_experiments
      - data/processed/train.parquet
      - data/processed/test.parquet
      - artifacts/models/current.pkl
    always_changed: true

  # ──────────────────────────────────────────────────────────
  # 7. Drift sintético (validação do pipeline de monitoramento)
  # ──────────────────────────────────────────────────────────
  generate_synthetic_drift:
    cmd: python -m src.evaluation.model.drift.synthetic_drifts --all
    deps:
      - src/evaluation/model/drift
      - artifacts/models/current.pkl  # output de train → ordem garantida
      - artifacts/rag                        # output de build_rag_cache → ordem garantida
      - data/processed/test.parquet
    outs:
      - artifacts/evaluation/model/scenario_experiments/drift
