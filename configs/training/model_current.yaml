experiment:
  name: random_forest_current
  run_name: random_forest_current
  version: 0.2.0
  algorithm: random_forest
  flavor: sklearn

dataset:
  target_col: Exited
  feature_set: processed_v1

training:
  params:
    n_estimators: 200
    max_depth: 15
    random_state: 42
    class_weight: balanced
    min_samples_leaf: 5

inference:
  threshold: 0.5

artifacts:
  model_path: artifacts/random_forest_current.pkl

mlflow:
  experiment_name: datathon-churn-baseline
  tags:
    owner: datathon-grupo
    phase: datathon-fase05
    dataset_name: bank-customer-churn
    model_family: random_forest
    candidate_type: current

registry:
  enabled: false
  model_name: churn-classifier
  alias: null

governance:
  risk_level: high
  fairness_checked: false
