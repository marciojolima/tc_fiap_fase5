experiment:
  name: random_forest_v3
  run_name: random_forest_v3
  version: 0.1.0
  algorithm: random_forest
  flavor: sklearn

dataset:
  target_col: Exited
  feature_set: processed_v1

training:
  params:
    n_estimators: 300
    max_depth: 8
    random_state: 42
    class_weight: balanced
    min_samples_leaf: 10

inference:
  threshold: 0.4

artifacts:
  model_path: artifacts/models/random_forest_v3.pkl

mlflow:
  experiment_name: datathon-churn-baseline
  tags:
    owner: datathon-grupo
    phase: datathon-fase05
    dataset_name: bank-customer-churn
    model_family: random_forest
    candidate_type: baseline

registry:
  enabled: false
  model_name: churn-classifier
  alias: null

governance:
  risk_level: high
  fairness_checked: false
