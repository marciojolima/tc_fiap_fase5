experiment:
  name: random_forest_baseline
  run_name: random_forest_baseline
  algorithm: random_forest
  flavor: sklearn

dataset:
  target_col: Exited
  feature_set: processed_v1

training:
  params:
    n_estimators: 100
    max_depth: 10
    random_state: 42
    class_weight: balanced

inference:
  threshold: 0.5

artifacts:
