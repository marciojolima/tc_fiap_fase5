# Golden set para avaliação de RAG / LLM-as-judge (Datathon – churn bancário + MLOps).
# Cada item: query = pergunta do usuário; expected_answer = resposta de referência (ground truth resumida).
# Uso: RAGAS (ground_truth), judge, e smoke tests. Revisar periodicamente com o time.
#
# schema_version: 1

schema_version: 1
title: golden_set_churn_mops
description: Pares alinhados ao repositório TC FIAP Fase 5 (dados, modelo, serving, observabilidade, governança).
locale: pt-BR
items:
  - id: gs-001
    category: negocio_churn
    query: O que significa a variável alvo Exited neste projeto de churn bancário?
    expected_answer: "Exited é a variável alvo: indica se o cliente deixou o banco (churn). Valores tipicamente 0 (permaneceu) ou 1 (saiu). O modelo aprende a prever essa saída a partir das features após o pré-processamento."

  - id: gs-002
    category: negocio_churn
    query: Quais colunas são removidas na preparação dos dados por conterem identificadores e não serem usadas no modelo?
    expected_answer: "O pipeline remove colunas como RowNumber, CustomerId e Surname (identificadores ou não preditivos), conforme configuração em pipeline_global_config e o fluxo de feature engineering."

  - id: gs-003
    category: negocio_churn
    query: O que representa NumOfProducts no contexto do datathon e por que importa para churn?
    expected_answer: "NumOfProducts é o número de produtos bancários ativos do cliente. Clientes com muitos ou muito poucos produtos podem ter padrão de risco de saída diferente; a feature entra no pipeline de modelagem de churn."

  - id: gs-004
    category: negocio_churn
    query: Qual o papel de Geography e como ela entra no modelo após o pré-processamento?
    expected_answer: "Geography indica o país (ex.: France, Germany, Spain). No pipeline vira features categóricas (ex. one-hot) e está entre colunas com governança/LGPD documentada no serving."

  - id: gs-005
    category: negocio_churn
    query: O que é Tenure e como se relaciona com fidelidade do cliente?
    expected_answer: "Tenure é o tempo (em anos) como cliente do banco. Em geral, maior permanência pode indicar relacionamento estabelecido; o modelo usa essa variável numérica entre outras para estimar risco de churn."

  - id: gs-006
    category: negocio_churn
    query: Explique de forma resumida o que o endpoint POST /predict retorna para o time de negócios.
    expected_answer: "O endpoint retorna a probabilidade de churn, a decisão binária (acima/abaixo do limiar), o nome do experimento/modelo e o limiar (threshold) usado na inferência, alinhado ao treino e ao MLflow."

  - id: gs-007
    category: mlops
    query: Onde ficam o pipeline de features e o modelo champion usados em produção pelo serving?
    expected_answer: "Artefatos em artifacts/models/ — em particular feature_pipeline.joblib (transformações) e model_current.pkl com metadados em model_current_metadata.json, alinhados ao experimento em configs/training/."

  - id: gs-008
    category: mlops
    query: Qual ferramenta o projeto usa para rastreio de experimentos e em qual diretório local isso costuma ser armazenado em desenvolvimento?
    expected_answer: "O projeto usa MLflow; a URI padrão no config global aponta para file:./mlruns e os runs ficam acessíveis via MLflow UI no fluxo de observabilidade (Docker)."

  - id: gs-009
    category: mlops
    query: O que o monitoramento de drift com Evidently e PSI busca identificar neste repositório?
    expected_answer: "Comparar a distribuição de dados de referência com dados correntes, calcular métricas como PSI por feature, sinalizar alerta (warning/critical) e apoiar decisão de retreino com artefatos em artifacts/monitoring/drift/."

  - id: gs-010
    category: mlops
    query: O que acontece quando o monitoramento de drift aponta condição crítica e o retreino está habilitado na configuração?
    expected_answer: "O fluxo pode registrar retrain_request e artefatos auditáveis (retrain_run, promotion_decision) com regras champion–challenger, sem promover automaticamente sem política explícita do projeto."

  - id: gs-011
    category: api_serving
    query: Quais campos o payload de predição de churn precisa conter no mínimo, em termos de família de variáveis?
    expected_answer: "Inclui atributos do cliente como CreditScore, Geography, Gender, Age, Tenure, Balance, NumOfProducts, HasCrCard, IsActiveMember, EstimatedSalary, Card Type e Point Earned, validados pelos schemas Pydantic de serving."

  - id: gs-012
    category: api_serving
    query: Por que o serving reutiliza o mesmo pipeline de features do treino?
    expected_answer: "Para evitar training-serving skew: as mesmas transformações (ordem, encoding, features derivadas) aplicadas no treino são aplicadas na inferência, garantindo consistência de métricas e decisão."

  - id: gs-013
    category: observabilidade
    query: Onde a aplicação expõe métricas operacionais consumíveis por Prometheus no stack do README?
    expected_answer: "A API registra métricas do serving (ex.: latência e contagem de requisições de predição) e expõe o endpoint /metrics integrado ao Prometheus no docker-compose de observabilidade."

  - id: gs-014
    category: observabilidade
    query: O que é registrado em artifacts/monitoring/inference_logs quando o logging de inferência está ativo?
    expected_answer: "Predições e contexto operacional (probabilidade, limiar, versão do modelo) em formato adequado a auditoria e a composição de bases para drift e análise posterior."

  - id: gs-015
    category: governanca
    query: Mencione uma prática de governança ou LGPD descrita no fluxo de inferência do serving.
    expected_answer: "O pipeline de inferência loga intenção de governança sobre colunas sensíveis (ex.: Geography governada) e evita uso de identificadores diretos removidos no preparo, conforme mensagens de log documentadas no código de serving."

  - id: gs-016
    category: rag_llm
    query: Quais rotas HTTP o projeto expõe especificamente para o assistente LLM e diagnóstico do Ollama?
    expected_answer: "Prefixo /llm: health, status (diagnóstico de URL e modelo) e chat (agente ReAct com tools), integrado a Ollama via variáveis de ambiente e config global."

  - id: gs-017
    category: rag_llm
    query: Cite pelo menos três ferramentas (tools) do agente ReAct ligadas ao domínio do datathon.
    expected_answer: "Exemplos: rag_search (recuperação sobre documentação do repositório), predict_churn (predição alinhada ao /predict/raw com payload bruto), drift_status (leitura de status de drift), scenario_prediction (cenário hipotético com schema de serving)."

  - id: gs-018
    category: rag_llm
    query: Em linhas gerais, como o RAG do projeto obtém contexto para uma pergunta?
    expected_answer: "Recupera trechos de arquivos de documentação e metadados (README, status do projeto, docs, JSON de schema/features quando presentes) com heurística lexical e limita a top-k passagens com indicação de fonte."

  - id: gs-019
    category: cenarios
    query: Onde a suíte de cenários de negócio versionada é definida e como costuma ser executada?
    expected_answer: "Em configs/scenario_analysis/inference_cases.yaml, com execução via módulo scenario_analysis ou task no pyproject, registrando análise no MLflow no experimento de scenario analysis."

  - id: gs-020
    category: dados
    query: Qual a função do DVC neste repositório em relação aos dados brutos e processados?
    expected_answer: "O DVC versiona ponteiros e metadados de datasets grandes; o Git rastreia arquivos .dvc e configuração, permitindo rastreabilidade e pull dos dados no ambiente da equipe."

  - id: gs-021
    category: dados
    query: Nomeie duas saídas típicas do pipeline de processamento após a engenharia de features.
    expected_answer: "Exemplos: data/processed/train.parquet e data/processed/test.parquet, além de listas e relatórios auxiliares como feature_columns.json e schema_report.json quando gerados no fluxo."

  - id: gs-022
    category: negocio_churn
    query: Por que EstimatedSalary e Balance podem ser relevantes para o risco de churn, em linguagem de negócios?
    expected_answer: "Saldo e renda estimada refletem engajamento financeiro e sensibilidade a ofertas ou restrições; o modelo as usa com outras features para separar clientes com maior propensão a deixar o banco."

  - id: gs-023
    category: integracao
    query: O que a task observability do pyproject inicia com o docker-compose do projeto (componentes de alto nível)?
    expected_answer: "Sobe, entre outros, o serving FastAPI, o stack de MLflow, Prometheus, Grafana, o serviço Ollama e o job de pull do modelo, conforme versão atual do repositório e o arquivo .env do desenvolvedor."

  - id: gs-024
    category: seguranca
    query: Que tipo de validação o InputGuardrail aplica ao texto do usuário antes de enviar ao LLM?
    expected_answer: "Detecta padrões de prompt-injection conhecidos, limita tamanho do texto a um máximo (ex. 4096 caracteres) e rejeita entrada com motivo claro, alinhado à camada de segurança do router LLM."
