seed: 42

data:
  raw_path: data/raw/Customer-Churn-Records.csv
  target_col: Exited
  drop_columns:
    - RowNumber
    - CustomerId
    - Surname

features:
  leakage_columns:
    - Exited
    - Complain
    - Satisfaction Score
  governed_columns:
    - Geography
  categorical_features:
    ordinal:
      Card Type:
        - SILVER
        - GOLD
        - PLATINUM
        - DIAMOND
      Gender:
        - Female
        - Male
    one_hot:
      Geography:
        - France
        - Germany
        - Spain

split:
  test_size: 0.2
  random_state: 42
  stratify: true

mlflow:
  tracking_uri: file:./mlruns
  experiment_name: datathon-churn-baseline
  scenario_analysis_experiment_name: datathon-churn-scenario-analysis
  monitoring_drift_experiment_name: datathon-churn-monitoring-drift
  owner: datathon-grupo
  phase: datathon-fase05
  dataset_name: bank-customer-churn

# llm.base_url: padrao local; em Docker sobrescreva com LLM_BASE_URL (ver .env.example).
llm:
  provider: ollama
  base_url: http://127.0.0.1:11434
  # Tag valida na biblioteca Ollama (ollama.com/library/qwen2.5). Quantizacao vem no blob do modelo.
  model_name: qwen2.5:3b
  timeout_seconds: 45

agent:
  max_iterations: 6
  min_tools: 3

rag:
  top_k: 3

security:
  max_input_chars: 4096
