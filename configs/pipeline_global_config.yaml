seed: 42

data:
  raw_path: data/raw/Customer-Churn-Records.csv
  target_col: Exited
  drop_columns:
    - RowNumber
    - CustomerId
    - Surname

features:
  leakage_columns:
    - Exited
    - Complain
    - Satisfaction Score

split:
  test_size: 0.2
  random_state: 42
  stratify: true

mlflow:
  tracking_uri: file:./mlruns
  experiment_name: datathon-churn-baseline
  what_if_experiment_name: datathon-churn-what-if
  owner: datathon-grupo
  phase: datathon-fase05
  dataset_name: bank-customer-churn
