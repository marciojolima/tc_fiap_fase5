seed: 42

data:
  raw_path: data/raw/Customer-Churn-Records.csv
  target_col: Exited
  drop_columns:
    - RowNumber
    - CustomerId
    - Surname

features:
  leakage_columns:
    - Exited
    - Complain
    - Satisfaction Score
  governed_columns:
    - Geography
  categorical_features:
    ordinal:
      Card Type:
        - SILVER
        - GOLD
        - PLATINUM
        - DIAMOND
      Gender:
        - Female
        - Male
    one_hot:
      Geography:
        - France
        - Germany
        - Spain

split:
  test_size: 0.2
  random_state: 42
  stratify: true

mlflow:
  tracking_uri: file:./mlruns
  experiment_name: datathon-churn-baseline
  scenario_analysis_experiment_name: datathon-churn-scenario-analysis
  monitoring_drift_experiment_name: datathon-churn-monitoring-drift
  owner: datathon-grupo
  phase: datathon-fase05
  dataset_name: bank-customer-churn

llm:
  active_provider: claude
  timeout_seconds: 60
  providers:
    ollama:
      base_url: http://127.0.0.1:11434
      model_name: qwen2.5:3b
    openai:
      base_url: https://api.openai.com/v1
      model_name: gpt-4o-mini
      api_key_env_var: OPENAI_API_KEY
      max_tokens: 1200
    claude:
      base_url: https://api.anthropic.com
      model_name: claude-haiku-4-5-20251001
      api_key_env_var: ANTHROPIC_API_KEY
      max_tokens: 1200

agent:
  max_iterations: 6
  min_tools: 3

rag:
  top_k: 4
  chunk_size: 900
  chunk_overlap: 150
  embedding_backend: fastembed
  embedding_model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  embedding_cache_dir: artifacts/rag/fastembed_model_cache
  cache_dir: artifacts/rag/cache
  history_path: artifacts/rag/index_build_history.jsonl
  lexical_rerank_weight: 0.15
  vector_candidate_multiplier: 4

security:
  max_input_chars: 4096
